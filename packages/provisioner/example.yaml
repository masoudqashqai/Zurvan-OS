# Example Zurvan first-boot config — the shape the provisioner targets.
#
# Pass it in via the kernel cmdline:
#   APPEND_EXTRA="zurvan.config=/etc/zurvan.yaml" scripts/run-qemu.sh
#
# Keys are a FIXED, bounded set (hostname / network / users / services).
# Anything not listed here is out of scope by design — see ROADMAP.md.

hostname: zurvan-box

network:
  eth0:
    # DHCP works under QEMU user-net AND VMware NAT alike. For a static
    # address, set dhcp: false and uncomment (these are QEMU's subnet):
    dhcp: true
    # address: 10.0.2.50/24
    # gateway: 10.0.2.2
    # dns:
    #   - 10.0.2.3

users:
  - name: zurvan
    # shell defaults to /bin/bash if omitted
    shell: /bin/bash
    # one of password (hashed) / authorized_keys is enough
    authorized_keys:
      - "ssh-ed25519 AAAA... example-key"

# lion — the /data snapshot daemon (v2 M4). Snapshots land in /data/lion/ as
# checksummed tar.gz ring buffer; restore with: zurvan-lion restore <name>.
# every accepts s/m/h/d suffixes. Defaults shown; enable with "- lion" below.
# lion:
#   every: 24h
#   keep: 7

services:
  # names the provisioner knows how to start; bounded set, not arbitrary units
  - networking
  - ssh
  # face — the web admin panel (v2 M6), ON by default. HTTPS on :8443 with a
  # per-box cert; the admin token is printed to the console at first boot.
  # Remove this line to run headless-only over SSH.
  - face
  # - lion
  # snake — job-queue daemon (v2 M5): runs files dropped in /data/snake/queue
  # in evaporating sandboxes; results in /data/snake/results. One-off jobs
  # work without it: zurvan-snake run <script>
  # - snake
