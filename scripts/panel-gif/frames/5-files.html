den name=path value="notes/ports.txt"><button class=r>Delete</button></form></td></tr></table></div><script>function post(u,d){var f=document.createElement('form');f.method='post';f.action=u;for(var k in d){var i=document.createElement('input');i.type='hidden';i.name=k;i.value=d[k];f.appendChild(i);}document.body.appendChild(f);f.submit();}function base(p){return p.split('/').pop();}function ren(p){var n=prompt('Rename to:',base(p));if(n)post('/files/rename',{path:p,name:n});}function cp(p){var n=prompt('Copy to (new name):',base(p));if(n)post('/files/copy',{path:p,name:n});}function nd(d){var n=prompt('New folder name:');if(n)post('/files/mkdir',{path:d,name:n});}function nf(d){var n=prompt('New file name:');if(n)location.href='/file?path='+(d?d+'/':'')+encodeURIComponent(n);}</script></main></body></html>
