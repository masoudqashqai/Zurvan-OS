<!doctype html><html><head><meta charset=utf-8><title>Zurvan — sign in</title><meta name=viewport content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box}body{margin:0;font:15px/1.5 system-ui,sans-serif;background:#0f1115;color:#d7dbe0}a{color:#6fb3ff;text-decoration:none}a:hover{text-decoration:underline}header{background:#161a21;border-bottom:1px solid #262c36;padding:0 20px;display:flex;align-items:center;gap:18px;height:52px}header .brand{font-weight:700;color:#fff;letter-spacing:.5px}header nav{display:flex;gap:14px}header .sp{flex:1}main{max-width:960px;margin:24px auto;padding:0 20px}h1{font-size:20px;margin:0 0 16px}h2{font-size:16px;margin:24px 0 10px;color:#aeb6c2}.card{background:#161a21;border:1px solid #262c36;border-radius:10px;padding:16px;margin:0 0 16px}table{width:100%;border-collapse:collapse}td,th{text-align:left;padding:8px 10px;border-bottom:1px solid #232833}th{color:#8b93a1;font-weight:600;font-size:13px}.ok{color:#5ad18b}.bad{color:#ff6b6b}.dim{color:#8b93a1}button,input[type=submit]{background:#2a6df4;color:#fff;border:0;border-radius:7px;padding:8px 14px;font:inherit;cursor:pointer}button.g{background:#333b49}button.r{background:#a13030}input[type=text],input[type=password],textarea{width:100%;background:#0f1115;color:#e8ebf0;border:1px solid #2a3140;border-radius:7px;padding:9px;font:inherit}textarea{min-height:340px;font-family:ui-monospace,monospace;font-size:13px}pre{background:#0b0d11;border:1px solid #232833;border-radius:8px;padding:12px;overflow:auto;font-size:13px}form.inline{display:inline}.mono{font-family:ui-monospace,monospace}.pill{font-size:12px;padding:2px 8px;border-radius:20px;background:#232833}details.info{background:#12202b;border:1px solid #1d3547;border-radius:10px;padding:12px 16px;margin:0 0 16px}details.info summary{cursor:pointer;color:#7fc4ff;font-weight:600;list-style:none}details.info summary::-webkit-details-marker{display:none}details.info[open] summary{margin-bottom:8px}details.info p{margin:6px 0;color:#b9c2cf}label{display:block;margin:0 0 6px;color:#aeb6c2;font-size:13px}input[type=file]{color:#aeb6c2;font:inherit}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.row input[type=file]{flex:1;min-width:0}table.pkg{table-layout:fixed}table.pkg td:nth-child(2),table.pkg th:nth-child(2){width:28%}table.pkg td:nth-child(3),table.pkg th:nth-child(3){width:160px;text-align:right}td.row{gap:6px;justify-content:flex-end}.box{max-width:340px;margin:12vh auto;padding:0 20px}</style></head><body><div class=box><h1>&#128367; Zurvan</h1><div class=card><form method=post action=/login><p class=dim>Enter the admin token (printed on the console at first boot).</p><p><input type=password name=token autofocus placeholder="admin token"></p><button>Sign in</button></form></div></div></body></html>
